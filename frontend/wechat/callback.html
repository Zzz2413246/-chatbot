<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>微信登录回调</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .callback-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .title {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 14px;
            opacity: 0.85;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            margin: 16px auto;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            color: #ffd6d6;
            margin-top: 12px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="callback-box">
        <div class="icon" id="icon">⏳</div>
        <div class="title" id="title">正在登录...</div>
        <div class="desc" id="desc">请稍候，正在处理微信登录回调</div>
        <div class="spinner" id="spinner"></div>
        <div class="error" id="error"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        // 从 URL 获取 code 和 state
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');

        const iconEl = document.getElementById('icon');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('desc');
        const spinnerEl = document.getElementById('spinner');
        const errorEl = document.getElementById('error');

        async function handleCallback() {
            if (!code || !state) {
                showError('缺少 code 或 state 参数', '可能链接已失效，请重新发起登录');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/wechat/callback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, state }),
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // 登录成功
                    iconEl.textContent = '✅';
                    titleEl.textContent = '登录成功';
                    descEl.textContent = `欢迎，${data.user.nickname || '微信用户'}！`;

                    // 通过 postMessage 通知主窗口
                    if (window.opener && !window.opener.closed) {
                        window.opener.postMessage({
                            type: 'wechat_login_success',
                            token: data.token,
                            user: data.user,
                        }, '*');
                    }

                    // 保存到 localStorage（兼容直接打开的情况）
                    localStorage.setItem('authToken', data.token);

                    // 延迟后关闭窗口
                    spinnerEl.style.display = 'none';
                    setTimeout(() => {
                        if (window.opener && !window.opener.closed) {
                            window.close();
                        } else {
                            window.location.href = '/';
                        }
                    }, 1200);
                } else {
                    const errMsg = data.detail || data.message || '登录失败';
                    showError('登录失败', errMsg);
                }
            } catch (err) {
                showError('网络错误', err.message || '无法连接服务器');
            }
        }

        function showError(title, desc) {
            iconEl.textContent = '❌';
            titleEl.textContent = title;
            descEl.textContent = '';
            errorEl.textContent = desc;
            spinnerEl.style.display = 'none';
        }

        handleCallback();
    </script>
</body>
</html>
