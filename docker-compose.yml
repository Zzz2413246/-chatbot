version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=prod
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL_NAME=${MODEL_NAME}
      - MAX_TOKENS=${MAX_TOKENS}
      - TEMPERATURE=${TEMPERATURE}
      - DEEPSEEK_API_KEY=${API_KEY}
      - CUSTOM_API_KEY=${CUSTOM_API_KEY:-}
      - CUSTOM_BASE_URL=${CUSTOM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DATABASE_URL=sqlite+aiosqlite:///./data/chatbot.db
      - ASR_MODEL=${ASR_MODEL:-qwen3-asr-flash}
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - WECHAT_REDIRECT_URI=${WECHAT_REDIRECT_URI:-http://localhost:8000/wechat/callback.html}
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
